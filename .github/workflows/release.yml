name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0-test.1
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  resolve-config:
    runs-on: ubuntu-latest
    outputs:
      app_id: ${{ steps.resolve.outputs.app_id }}
    steps:
      - name: Resolve release config
        id: resolve
        shell: bash
        run: |
          app_id="${{ secrets.APP_ID }}"
          if [[ -z "$app_id" ]]; then
            echo "APP_ID is not set" >&2
            exit 1
          fi

          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

  create-release:
    needs: resolve-config
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
    steps:
      - name: Validate version
        id: prepare
        shell: bash
        run: |
          tag="${{ inputs.version }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.prepare.outputs.tag_name }}
        run: |
          prerelease_args=()
          if [[ "$TAG_NAME" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$TAG_NAME" \
            --notes "Automated release for $TAG_NAME" \
            "${prerelease_args[@]}"

  build-assets:
    needs: create-release
    uses: ./.github/workflows/ci-wails-build.yml
    with:
      tag_name: ${{ needs.create-release.outputs.tag_name }}
    secrets: inherit

  update-homebrew:
    needs:
      - resolve-config
      - create-release
      - build-assets
    uses: ./.github/workflows/update-homebrew.yml
    with:
      app_id: ${{ needs.resolve-config.outputs.app_id }}
      tag_name: ${{ needs.create-release.outputs.tag_name }}
    secrets: inherit

  update-scoop:
    needs:
      - resolve-config
      - create-release
      - build-assets
    uses: ./.github/workflows/update-scoop.yml
    with:
      app_id: ${{ needs.resolve-config.outputs.app_id }}
      tag_name: ${{ needs.create-release.outputs.tag_name }}
    secrets: inherit

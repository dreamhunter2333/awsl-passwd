name: CI Wails Build

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            asset_name: wails-passwd-macOS-amd64.dmg
          - arch: arm64
            asset_name: wails-passwd-macOS-arm64.dmg

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Wails app
        shell: bash
        env:
          CGO_LDFLAGS: -framework UniformTypeIdentifiers
        run: |
          wails build \
            -clean \
            -platform "darwin/${{ matrix.arch }}"
            -s

      - name: Package DMG
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          app_path="build/bin/WailsPassword.app"
          if [[ ! -d "$app_path" ]]; then
            echo "App bundle not found: $app_path" >&2
            find build -maxdepth 3 -print
            exit 1
          fi

          rm -rf dist
          mkdir -p dist/dmg-root
          cp -R "$app_path" dist/dmg-root/
          ln -s /Applications dist/dmg-root/Applications

          hdiutil create \
            -volname "WailsPassword" \
            -srcfolder dist/dmg-root \
            -ov \
            -format UDZO \
            "dist/${ASSET_NAME}"

          shasum -a 256 "dist/${ASSET_NAME}" | awk '{print $1}' > "dist/${ASSET_NAME}.sha256"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --repo "${{ github.repository }}" --clobber

  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Add Go bin to PATH
        shell: pwsh
        run: |
          $gobin = Join-Path (go env GOPATH) "bin"
          Add-Content -Path $env:GITHUB_PATH -Value $gobin

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build Windows executable
        shell: pwsh
        run: |
          wails build `
            -clean `
            -platform windows/amd64 `
            -s

      - name: Prepare release assets
        shell: pwsh
        run: |
          if (!(Test-Path "build/bin/wails-passwd.exe")) {
            Write-Host "Binary not found: build/bin/wails-passwd.exe"
            Get-ChildItem build/bin -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "build/bin/wails-passwd.exe" "dist/wails-passwd.exe"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/wails-passwd.exe").Hash.ToLower()
          Set-Content -Path "dist/wails-passwd.exe.sha256" -Value $hash -NoNewline

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: gh release upload $env:TAG_NAME dist/* --repo "${{ github.repository }}" --clobber

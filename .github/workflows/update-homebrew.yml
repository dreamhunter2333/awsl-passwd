name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: dreamhunter2333
          repositories: |
            homebrew-dreamhunter
          permission-contents: write

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: dreamhunter2333/homebrew-dreamhunter
          token: ${{ steps.app-token.outputs.token }}
          path: tap

      - name: Download macOS assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          mkdir -p dist
          gh release download "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern "wails-passwd_*_darwin_amd64.tar.gz" \
            --pattern "wails-passwd_*_darwin_arm64.tar.gz"

      - name: Generate formula
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          version="${TAG_NAME#v}"
          amd64_asset="dist/wails-passwd_${version}_darwin_amd64.tar.gz"
          arm64_asset="dist/wails-passwd_${version}_darwin_arm64.tar.gz"
          amd64_sha="$(sha256sum "$amd64_asset" | awk '{print $1}')"
          arm64_sha="$(sha256sum "$arm64_asset" | awk '{print $1}')"

          cat > tap/Formula/wails-passwd.rb <<EOF
          class WailsPasswd < Formula
            desc "Desktop password manager with TOTP support"
            homepage "https://github.com/dreamhunter2333/awsl-passwd"
            version "${version}"
            license "MIT"

            if Hardware::CPU.intel?
              url "https://github.com/dreamhunter2333/awsl-passwd/releases/download/${TAG_NAME}/wails-passwd_${version}_darwin_amd64.tar.gz"
              sha256 "${amd64_sha}"
            else
              url "https://github.com/dreamhunter2333/awsl-passwd/releases/download/${TAG_NAME}/wails-passwd_${version}_darwin_arm64.tar.gz"
              sha256 "${arm64_sha}"
            end

            def install
              bin.install "wails-passwd"
            end
          end
          EOF

      - name: Commit and push formula
        shell: bash
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wails-passwd.rb
          git commit -m "chore: update wails-passwd to ${{ inputs.tag_name }}" || exit 0
          git push

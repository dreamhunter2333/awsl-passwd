name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: dreamhunter2333
          repositories: |
            homebrew-dreamhunter
          permission-contents: write

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: dreamhunter2333/homebrew-dreamhunter
          token: ${{ steps.app-token.outputs.token }}
          path: tap

      - name: Download macOS checksums
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          base_url="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}"
          curl -fsSL "${base_url}/wails-passwd-macOS-amd64.dmg.sha256" -o amd64.sha256
          curl -fsSL "${base_url}/wails-passwd-macOS-arm64.dmg.sha256" -o arm64.sha256

      - name: Generate cask
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          version="${TAG_NAME#v}"
          amd64_sha="$(tr -d '\n\r' < amd64.sha256)"
          arm64_sha="$(tr -d '\n\r' < arm64.sha256)"
          mkdir -p tap/Casks
          rm -f tap/Formula/wails-passwd.rb

          cat > tap/Casks/wails-passwd.rb <<EOF
          cask "wails-passwd" do
            version "${version}"
            name "Wails Password"
            desc "Desktop password manager with TOTP support"
            homepage "https://github.com/dreamhunter2333/awsl-passwd"

            if Hardware::CPU.intel?
              url "https://github.com/dreamhunter2333/awsl-passwd/releases/download/${TAG_NAME}/wails-passwd-macOS-amd64.dmg"
              sha256 "${amd64_sha}"
            else
              url "https://github.com/dreamhunter2333/awsl-passwd/releases/download/${TAG_NAME}/wails-passwd-macOS-arm64.dmg"
              sha256 "${arm64_sha}"
            end

            app "WailsPassword.app"
          end
          EOF

      - name: Commit and push cask
        shell: bash
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update wails-passwd to ${{ inputs.tag_name }}" || exit 0
          git push

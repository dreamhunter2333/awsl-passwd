<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>密码管理器</title>
    <link href="./styles.css" rel="stylesheet">
</head>

<body>
    <div class="shell">
        <header class="topbar panel">
            <div class="topbar-brand">
                <div class="topbar-mark" aria-hidden="true">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M17 8h-1V6a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-6 7.73V17a1 1 0 1 0 2 0v-1.27a2 2 0 1 0-2 0ZM9.9 8V6a2.1 2.1 0 1 1 4.2 0v2H9.9Z" />
                    </svg>
                </div>
                <div class="topbar-copy">
                    <h1 data-i18n="appTitle"></h1>
                    <p id="headerMeta" data-i18n="headerMetaLoading"></p>
                </div>
            </div>

            <div class="topbar-actions">
                <button class="icon-action compact-toggle text-toggle" data-action="toggle-language"
                    id="languageToggleButton" type="button">
                    <span id="languageToggleLabel">EN</span>
                </button>
                <button class="icon-action compact-toggle" data-action="toggle-theme" id="themeToggleButton"
                    type="button">
                    <span class="toggle-icon" id="themeToggleIcon" aria-hidden="true"></span>
                </button>
                <button class="icon-action compact-toggle" data-action="toggle-settings" id="settingsToggleButton"
                    type="button">
                    <span class="toggle-icon" id="settingsToggleIcon" aria-hidden="true"></span>
                </button>
                <button class="icon-action compact-toggle" data-action="refresh" id="refreshButton" type="button">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path
                            d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7a5 5 0 1 1-4.9 6.01H5.02A7 7 0 1 0 17.65 6.35Z" />
                    </svg>
                </button>
                <button class="md-button filled compact-add" data-action="show-add" id="addAccountButton" type="button">
                    <svg class="button-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z" />
                    </svg>
                    <span data-i18n="addAccount"></span>
                </button>
            </div>
        </header>

        <main class="workspace">
            <section class="view-panel panel" id="accountsView">
                <div class="panel-header dense">
                    <div>
                        <h2 data-i18n="accountsTitle"></h2>
                        <p class="section-heading-copy" data-i18n="accountsSubtitleCompact"></p>
                    </div>
                    <div class="panel-tools account-toolbar">
                        <div class="summary-pills">
                            <span class="status-pill" id="recordsStatus">0</span>
                            <span class="status-pill" id="otpStatus">0</span>
                            <span class="mode-chip" id="storageModeChip">-</span>
                        </div>
                        <button class="md-button outlined subtle-lock-button" data-action="lock-security"
                            data-i18n="lockVault" id="accountLockButton" type="button" hidden></button>
                    </div>
                </div>

                <div class="table-shell" id="accountsTableShell">
                    <div class="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th data-i18n="colName"></th>
                                    <th data-i18n="colPassword"></th>
                                    <th data-i18n="colNotes"></th>
                                    <th data-i18n="colOtp"></th>
                                    <th data-i18n="colActions"></th>
                                </tr>
                            </thead>
                            <tbody id="accountsList"></tbody>
                        </table>
                    </div>
                </div>

                <div class="empty-state" id="emptyState">
                    <div class="empty-card">
                        <div class="empty-icon" aria-hidden="true">
                            <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18 8h-1V6a5 5 0 1 0-10 0v2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-9-2a3 3 0 1 1 6 0v2H9V6Zm3 9.75A1.75 1.75 0 1 1 13.75 14 1.75 1.75 0 0 1 12 15.75Z" />
                            </svg>
                        </div>
                        <h3 id="emptyStateTitle"></h3>
                        <p id="emptyStateSubtitle"></p>
                        <div class="empty-unlock" id="emptyStateUnlock" hidden>
                            <div class="empty-unlock-row">
                                <input class="empty-unlock-input" data-i18n-placeholder="securityPasswordCurrent"
                                    id="emptyStateUnlockPassword" type="password">
                                <button class="md-button filled" data-action="unlock-security" data-i18n="unlockVault"
                                    id="emptyStateUnlockButton" type="button"></button>
                            </div>
                            <p class="empty-unlock-hint" data-i18n="unlockInlineHint"></p>
                        </div>
                        <button class="md-button filled" id="emptyStateAction" type="button"></button>
                    </div>
                </div>
            </section>

            <section class="view-panel panel settings-view" id="settingsView" hidden>
                <div class="panel-header dense">
                    <div>
                        <h2 data-i18n="settingsTitle"></h2>
                        <p class="section-heading-copy" data-i18n="settingsSubtitle"></p>
                    </div>
                    <button class="md-button outlined" data-action="toggle-settings" data-i18n="backToAccounts"
                        type="button"></button>
                </div>

                <div class="settings-grid">
                    <article class="settings-card">
                        <div class="section-heading">
                            <div>
                                <h3 data-i18n="storageTitle"></h3>
                                <p data-i18n="storageSubtitle"></p>
                            </div>
                            <span class="mode-chip" id="settingsStorageModeChip">-</span>
                        </div>
                        <div class="storage-stack">
                            <div class="storage-item">
                                <div class="storage-item-label" data-i18n="currentFilePath"></div>
                                <div class="storage-path" id="storagePath">-</div>
                            </div>
                        </div>
                        <div class="storage-actions">
                            <button class="md-button filled" data-action="select-config" type="button">
                                <svg class="button-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                    <path d="M10 4H4v16h16V8h-8l-2-4Zm2 6h6v8H6V6h2.76l2 4H12Z" />
                                </svg>
                                <span data-i18n="changeFile"></span>
                            </button>
                            <button class="md-button outlined" data-action="reset-config" id="resetConfigButton"
                                type="button">
                                <svg class="button-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                                    <path
                                        d="M12 5V1L7 6l5 5V7c2.76 0 5 2.24 5 5a5 5 0 1 1-9.9-1h-2.02A7 7 0 1 0 12 5Z" />
                                </svg>
                                <span data-i18n="resetDefault"></span>
                            </button>
                        </div>
                    </article>

                    <article class="settings-card">
                        <div class="section-heading">
                            <div>
                                <h3 data-i18n="securityTitle"></h3>
                                <p data-i18n="securitySubtitle"></p>
                            </div>
                            <span class="mode-chip" id="securityStatusChip">-</span>
                        </div>
                        <p class="assist-note" data-i18n="encryptionToggleHint"></p>
                        <div class="form-grid compact-form">
                            <div class="field" id="securityPasswordField">
                                <label for="securityPassword" id="securityPasswordLabel"></label>
                                <input id="securityPassword" type="password">
                            </div>
                            <div class="field" id="securityPasswordConfirmField" hidden>
                                <label for="securityPasswordConfirm" data-i18n="securityPasswordConfirm"></label>
                                <input id="securityPasswordConfirm" type="password">
                            </div>
                        </div>
                        <div class="security-actions">
                            <button class="md-button filled" data-action="submit-security" id="securitySubmitButton"
                                type="button">
                                <span id="securitySubmitLabel"></span>
                            </button>
                        </div>
                    </article>

                    <article class="settings-card">
                        <div class="section-heading">
                            <div>
                                <h3 data-i18n="preferencesTitle"></h3>
                                <p data-i18n="preferencesSubtitle"></p>
                            </div>
                        </div>
                        <div class="preference-list">
                            <div class="preference-item">
                                <span data-i18n="languageLabel"></span>
                                <strong id="currentLanguageValue">-</strong>
                            </div>
                            <div class="preference-item">
                                <span data-i18n="themeLabel"></span>
                                <strong id="currentThemeValue">-</strong>
                            </div>
                            <div class="preference-item">
                                <span data-i18n="fileMode"></span>
                                <strong id="currentStorageModeValue">-</strong>
                            </div>
                        </div>
                        <p class="assist-note" data-i18n="preferencesHint"></p>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <div class="modal" id="accountModal">
        <div class="dialog" role="dialog" aria-modal="true">
            <div class="dialog-header">
                <h2 class="dialog-title" id="accountModalTitle"></h2>
                <button class="icon-action" data-action="close-modal" data-modal-id="accountModal" aria-label="close"
                    type="button">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3z" />
                    </svg>
                </button>
            </div>
            <div class="dialog-body">
                <form id="accountForm">
                    <input type="hidden" id="accountId" value="">
                    <div class="form-grid">
                        <div class="field">
                            <label for="accountName" data-i18n="fieldName"></label>
                            <input id="accountName" required type="text">
                        </div>
                        <div class="field">
                            <label for="accountPassword" data-i18n="fieldPassword"></label>
                            <input id="accountPassword" type="text">
                        </div>
                        <div class="field">
                            <label for="accountOTPKey" data-i18n="fieldOtpKey"></label>
                            <input id="accountOTPKey" data-i18n-placeholder="otpPlaceholder" type="text">
                            <div class="field-helper" data-i18n="otpHelper"></div>
                        </div>
                        <div class="field">
                            <label for="accountNotes" data-i18n="fieldNotes"></label>
                            <textarea id="accountNotes"></textarea>
                        </div>
                    </div>
                    <div class="dialog-actions">
                        <button class="md-button outlined" data-action="close-modal" data-modal-id="accountModal"
                            data-i18n="cancel" type="button"></button>
                        <button class="md-button filled" data-i18n="save" type="submit"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="dialog" role="dialog" aria-modal="true">
            <div class="dialog-header">
                <h2 class="dialog-title" data-i18n="deleteTitle"></h2>
                <button class="icon-action" data-action="close-modal" data-modal-id="deleteModal" aria-label="close"
                    type="button">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3z" />
                    </svg>
                </button>
            </div>
            <div class="dialog-body">
                <p class="dialog-copy" data-i18n="deleteBody"></p>
                <div class="dialog-actions">
                    <button class="md-button outlined" data-action="close-modal" data-modal-id="deleteModal"
                        data-i18n="cancel" type="button"></button>
                    <button class="md-button destructive" data-action="confirm-delete" data-i18n="deleteConfirm"
                        type="button"></button>
                </div>
            </div>
        </div>
    </div>

    <div class="snackbar" id="snackbar"></div>

    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
</body>

</html>
